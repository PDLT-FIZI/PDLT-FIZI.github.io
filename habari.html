<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habari za Chama</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f0f2f5; }
    .header { background: #003366; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
    .content { padding: 2rem; max-width: 800px; margin: 0 auto; }
    .card { background: white; padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    button { background: #cc0000; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="header">
    <h2>Habari za Ndani - PDLT-FIZI</h2>
    <button onclick="toka()">Toka</button>
  </div>
  <div class="content" id="content">
    <div class="card">
      <h3>Inapakia...</h3>
    </div>
  </div>

<script>
  const SUPABASE_URL = 'https://fifriomgwjvfdhhiglwq.supabase.co/rest/v1/';
  const SUPABASE_ANON_KEY = 'sb_publishable_t5DVIP99ktQgFFMNAtPSHQ_bs58x4iK';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function angaliaMtu() {
    const { data: { user } } = await supabase.auth.getUser();
    
    if (!user) {
      window.location.href = 'login.html';
      return;
    }

    const { data: profile } = await supabase
      .from('profiles')
      .select('jina_kamili')
      .eq('id', user.id)
      .single();

    document.getElementById('content').innerHTML = `
      <div class="card">
        <h3>Karibu, ${profile?.jina_kamili || 'Mwanachama'}!</h3>
        <p>Hii ni sehemu ya siri ya wanachama wa PDLT-FIZI. Habari za chama zitawekwa hapa.</p>
      </div>
      <div class="card">
        <h3>Tangazo la Leo</h3>
        <p>Mkutano wa viongozi utafanyika Jumapili saa 4 asubuhi. Weka ratiba yako.</p>
      </div>
    `;
  }

  async function toka() {
    await supabase.auth.signOut();
    window.location.href = 'login.html';
  }

  angaliaMtu();
</script>
</body>
</html>
