<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ingia - PDLT FIZI</title>
    <style>
        body { font-family: Arial; background: #0D47A1; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
        input { padding: 12px; width: 250px; margin: 10px 0; border: 1px solid #ddd; }
        button { background: #FF6F00; color: white; padding: 12px 30px; border: none; cursor: pointer; }
        h2 { color: #0D47A1; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔒 Eneo la Wanachama PDLT</h2>
        <p>Ingiza neno la siri kuendelea</p>
        <form id="form">
            <input type="password" id="password" placeholder="Neno la Siri" required>
            <br>
            <button type="submit">Ingia</button>
        </form>
        <p id="error" style="color:red; display:none;">Neno la siri si sahihi!</p>
    </div>

    <!-- STATICRYPT LIBRARY -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        // BADILISHA NENO LA SIRI HAPA. Hii ni example: PDLTFizi2026
        const encryptedMsg = 'U2FsdGVkX1/9Q+7Z3z1J8bQ5fKz3r8Yp1c0q5w0x8v8='; 
        
        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            
            // Hii ni password: "PDLTFizi2026" - BADILISHA
            if (pass === "PDLTFizi2026") {
                // Ikiwa sahihi, nenda wanachama.html
                window.location.href = "wanachama.html";
            } else {
                document.getElementById('error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
